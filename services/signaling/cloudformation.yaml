AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Quick Relay WebSocket Signaling Service.
  This stack provisions:
    - A DynamoDB table for storing session data (with TTL for cleanup).
    - A Lambda function (from S3) that handles WebSocket events:
        • $connect: Only establishes the connection.
        • "init": Processes an initial message from the client. If the payload contains no sessionCode, it creates a new session and returns a new code; if it contains a sessionCode, it attempts to join an existing session.
    - An API Gateway WebSocket API with routes for $connect, "init".
    - A deployment and stage for the WebSocket API.
    
Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket where the Lambda deployment package is stored.
  S3Key:
    Type: String
    Description: S3 key (path) to the Lambda deployment package ZIP file.
  EnvironmentType:
    Type: String
    Default: Development
    AllowedValues:
      - Development
      - Production
    Description: Deployment environment type.
  DynamoDBTableName:
    Type: String
    Default: SignalingSessions
    Description: The name of the DynamoDB table for storing session data.

Resources:
  ## DynamoDB Table for Session Data
  QuickRelaySessionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      AttributeDefinitions:
        - AttributeName: SessionCode
          AttributeType: S
      KeySchema:
        - AttributeName: SessionCode
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ExpiresAt
        Enabled: true

  ## IAM Role for the Signaling Lambda
  SignalingLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: QuickRelayWebsocketLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
            Action: 
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QuickRelayDynamoDBPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}
        - PolicyName: QuickRelayManageConnectionsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QuickRelayWebSocketApi}/*/POST/@connections/*

  ## Lambda function for WebSocket signaling
  QuickRelayWebsocketLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: QuickRelayWebsocketSignaling
      Handler: signaling.handler.lambda_handler
      Runtime: python3.12
      Role: !GetAtt SignalingLambdaRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref EnvironmentType
          TABLE_NAME: !Ref DynamoDBTableName

  ## API Gateway WebSocket API
  QuickRelayWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: QuickRelayWebSocketApi
      ProtocolType: WEBSOCKET
      # Use the "action" field in the JSON body to route messages.
      RouteSelectionExpression: "$request.body.action"

  ## Integration between the WebSocket API and Lambda (AWS_PROXY)
  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QuickRelayWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${QuickRelayWebsocketLambdaFunction.Arn}/invocations

  ## $connect Route (only establishes the connection)
  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuickRelayWebSocketApi
      RouteKey: "$connect"
      Target: !Sub integrations/${WebSocketIntegration}

  ## $connect Route (only establishes the connection)
  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuickRelayWebSocketApi
      RouteKey: "$disconnect"
      Target: !Sub integrations/${WebSocketIntegration}

  ## Custom "init" Route for session creation/joining
  InitRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuickRelayWebSocketApi
      RouteKey: "init"
      Target: !Sub integrations/${WebSocketIntegration}
  
  ## Custom "signal" Route for relaying WebRTC signaling messages
  SignalRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuickRelayWebSocketApi
      RouteKey: "signal"
      Target: !Sub integrations/${WebSocketIntegration}

  ## Deployment of the WebSocket API
  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    Properties:
      ApiId: !Ref QuickRelayWebSocketApi
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - InitRoute
      - SignalRoute

  ## WebSocket Stage
  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref QuickRelayWebSocketApi
      AutoDeploy: true
      StageName: prod

  ## Lambda Permission for API Gateway
  LambdaPermissionForWebSocket:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt QuickRelayWebsocketLambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QuickRelayWebSocketApi}/*

Outputs:
  WebSocketEndpoint:
    Description: "The WebSocket endpoint for the Quick Relay signaling service"
    Value: !Sub "wss://${QuickRelayWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"