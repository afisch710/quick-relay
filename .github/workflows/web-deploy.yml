name: Deploy to GitHub Pages

on:
  push:
    branches:
      - development
    paths:
      - 'apps/web/**'

permissions:
  # Required for uploading and deploying to GitHub Pages
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    # By default, all "run" commands will happen in the apps/web directory.
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Check out Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: yarn install

      - name: Run Tests
        run: yarn test --watchAll=false

      - name: Build Project
        run: yarn build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The build output directory for a typical CRA is "build"
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4