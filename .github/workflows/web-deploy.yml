name: Deploy to GitHub Pages

on:
  push:
    branches:
      - development
    paths:
      - 'apps/web/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install Dependencies
        run: yarn install

      - name: Run Tests
        run: yarn test --watchAll=false

      - name: Build Project
        run: yarn build

      - name: Deploy to GitHub Pages
        run: yarn deploy
        env:
          CI: true