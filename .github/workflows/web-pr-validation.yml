name: PR Validation Build

on:
  pull_request:
    branches:
      - development
    paths:
      - 'apps/web/**'

jobs:
  pr-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: yarn install

      - name: Run Lint
        run: yarn lint

      - name: Run Tests
        run: yarn test --watchAll=false

      - name: Build Project
        run: yarn build